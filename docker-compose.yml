version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: uzcar-rent-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: uzcar_rent
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - uzcar-rent-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d uzcar_rent"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  uzcar-rent-postgres-data:
